<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра: Княз Батенберг - Решения и Съдби</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Playfair+Display:italic,wght@700;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        
        .fade-in { animation: fadeIn 0.7s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .zoom-in { animation: zoomIn 0.5s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .progress-transition { transition: width 0.7s ease-out; }
        
        /* Скриване на скролбара за чист вид */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #fef3c7; }
        ::-webkit-scrollbar-thumb { background: #78350f; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center p-0 md:p-6 min-h-screen">

    <div id="app" class="w-full max-w-5xl bg-amber-50 md:rounded-3xl shadow-2xl overflow-hidden border border-amber-200 flex flex-col min-h-screen md:min-h-[85vh] relative fade-in">
        <!-- Тук се рендира съдържанието чрез JS -->
    </div>

    <script>
        const CASES = [
            {
                id: 1, year: "1877 г.", title: "Навечерието на Освобождението",
                description: "Вие сте Александър Батенберг, млад офицер. Руско-турската война започва. Вашето участие ще определи бъдещия ви авторитет.",
                imageUrl: "https://i.ytimg.com/vi/_qm9hYM3jlc/sddefault.jpg",
                imageAlt: "[Боевете на Шипка]",
                source: "„Моето сърце бие за този народ, който толкова е страдал.“",
                options: [
                    { text: "Включвам се в предните части на армията.", impacts: { foreign: 10, internal: 20, unification: 5 }, feedback: "Вашата храброст при Шипка ви прави легенда сред българите." },
                    { text: "Служа в щаба на Императора.", impacts: { foreign: 5, internal: -10, unification: 0 }, feedback: "Печелите политически опит, но губите връзката с обикновения войник." }
                ]
            },
            {
                id: 2, year: "1879 г.", title: "Изборът в Търново",
                description: "Великото народно събрание ви избира за Княз. Конституцията е твърде либерална. Как ще реагирате?",
                imageUrl: "https://plovdivnow.bg/news/2023/04/17/17-april-istoriiata-aleksandar-357.png",
                imageAlt: "[Княз Александър I]",
                source: "„Заклевам се да пазя Търновската конституция!“",
                options: [
                    { text: "Приемам и спазвам законите.", impacts: { foreign: 0, internal: 20, unification: 0 }, feedback: "Либералите ви подкрепят, но управлението е трудно." },
                    { text: "Търся начини за повече власт.", impacts: { foreign: 10, internal: -15, unification: 0 }, feedback: "Това създава първото голямо напрежение в страната." }
                ]
            },
            {
                id: 3, year: "1881 г.", title: "Режим на пълномощията",
                description: "Искате пълна власт за 7 години, за да въведете ред в държавата. Това е огромен политически риск.",
                imageUrl: "https://www.marginalia.bg/wp-content/uploads/2026/03/konstitucia-.jpg",
                imageAlt: "[Търновска конституция]",
                source: "„Аз не мога да нося отговорност, без да имам власт.“",
                options: [
                    { text: "Суспендирам конституцията.", impacts: { foreign: 15, internal: -30, unification: -5 }, feedback: "Редът се завръща, но на висока демократична цена." },
                    { text: "Оставам в рамките на закона.", impacts: { foreign: -5, internal: 15, unification: 5 }, feedback: "Кризата продължава, но спасявате демократичния облик." }
                ]
            },
            {
                id: 4, year: "1882 г.", title: "Руските „наставници“",
                description: "Руските генерали в кабинета се държат като господари. Трябва да защитите българското достойнство.",
                imageUrl: "https://faktor.bg/static/downloads/uploads/Images_3/A/alexander-treti.jpg",
                imageAlt: "[Император Александър III]",
                source: "„Генералите гледат на мен като на руски губернатор.“",
                options: [
                    { text: "Ограничавам влиянието им.", impacts: { foreign: -25, internal: 20, unification: 10 }, feedback: "Русия приема това като лично оскърбление. Отношенията се смразяват." },
                    { text: "Сътруднича с тях засега.", impacts: { foreign: 20, internal: -20, unification: -10 }, feedback: "Българите започват да ви подозират в предателство." }
                ]
            },
            {
                id: 5, year: "1883 г.", title: "Помирение с народа",
                description: "Осъзнавате грешката на личния режим. Как да върнете доверието на българите?",
                imageUrl: "https://epochtimes.bg/wp-content/uploads/2021/09/alexander_battenberg.jpg",
                imageAlt: "[Портрет на Батенберг]",
                source: "„Връщам се към законността, тя е единственият път.“",
                options: [
                    { text: "Възстановявам Конституцията.", impacts: { foreign: -10, internal: 30, unification: 10 }, feedback: "Народът празнува! Вие отново сте „народният княз“." },
                    { text: "Правя само козметични промени.", impacts: { foreign: 5, internal: -10, unification: 0 }, feedback: "Доверието остава ниско, опозицията се засилва." }
                ]
            },
            {
                id: 6, year: "1885 г.", title: "Съединението",
                description: "Пловдив въстава. Русия е против. Ще приемете ли короната на обединена България?",
                imageUrl: "https://trud.bg/storage/media/2023-09/1578472/50-_(4)_3328148917230599988_original.png",
                imageAlt: "[Съединението]",
                source: "„Моята съдба е неразривно свързана със съдбата на този народ.“",
                options: [
                    { text: "Признавам го с Манифест.", impacts: { foreign: -30, internal: 30, unification: 40 }, feedback: "Вие сте символ на единството. Русия ви задрасква окончателно." },
                    { text: "Изчаквам решение на Великите сили.", impacts: { foreign: 15, internal: -30, unification: -20 }, feedback: "Съединението можеше да бъде загубено заради нерешителност." }
                ]
            },
            {
                id: 7, year: "Ноември 1885 г.", title: "Сливница",
                description: "Сърбия ни напада. Сливница е последната надежда на България.",
                imageUrl: "https://upload.wikimedia.org/wikipedia/commons/2/26/Battle_of_Slivnitsa.jpg",
                imageAlt: "[Битката при Сливница]",
                source: "„Войници, пред вас е пътя към София, зад вас е България!“",
                options: [
                    { text: "Оставам на фронта докрай.", impacts: { foreign: 10, internal: 25, unification: 20 }, feedback: "Победата при Сливница легитимира Съединението." },
                    { text: "Търся дипломатически изход.", impacts: { foreign: 15, internal: -5, unification: 0 }, feedback: "Войната спира, но България губи военната си слава." }
                ]
            },
            {
                id: 8, year: "1886 г.", title: "Превратът",
                description: "Офицери-русофили ви арестуват в двореца. Искат абдикация.",
                imageUrl: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6GWoblyjWjx3IvzrDABsMxbPV14_yDRVeaA&s",
                imageAlt: "[Детронирането]",
                source: "„Боже, пази България!“",
                options: [
                    { text: "Подписвам, за да няма кръв.", impacts: { foreign: 10, internal: -20, unification: -5 }, feedback: "Напускате страната, докато Стамболов готви отговор." },
                    { text: "Оказвам съпротива.", impacts: { foreign: -10, internal: 10, unification: 0 }, feedback: "Рискувате гражданска война с непредвидим край." }
                ]
            },
            {
                id: 9, year: "Август 1886 г.", title: "Завръщането",
                description: "Стамболов ви връща триумфално. Какво ще пишете на руския Император?",
                imageUrl: "https://www.1001kartini.com/5021/3655-grafichen-portret-na-stefan-stambolov-kartina-s-efekten-rchen-relef-s-3d-maslo-individualna-izrabotka-po-porchka.jpg",
                imageAlt: "[Стефан Стамболов]",
                source: "„Тъй като Русия ми даде короната, тя може да си я вземе.“",
                options: [
                    { text: "Изпращам телеграма за мир.", impacts: { foreign: 10, internal: -20, unification: 0 }, feedback: "Това е политическа грешка — Императорът остава безмилостен." },
                    { text: "Обявявам пълна независимост.", impacts: { foreign: -30, internal: 25, unification: 10 }, feedback: "Конфликтът е окончателен, но духът на народа е свободен." }
                ]
            },
            {
                id: 10, year: "Септември 1886 г.", title: "Втората абдикация",
                description: "За да спасите Съединението и мира, трябва да напуснете трона завинаги.",
                imageUrl: "https://www.bulgarianhistory.org/wp-content/uploads/2013/04/%D0%9F%D0%BE%D1%80%D1%82%D1%80%D0%B5%D1%82-%D0%BD%D0%B0-%D0%9A%D0%BD%D1%8F%D0%B7-%D0%90%D0%BB%D0%B5%D0%BA%D1%81%D0%B0%D0%BD%D0%B4%D1%8A%D1%80-I-%D0%91%D0%B0%D1%82%D0%B5%D0%BD%D0%B1%D0%B5%D1%80%D0%B3-%D1%81%D0%BA%D0%BE%D1%80%D0%BE-%D1%81%D0%BB%D0%B5%D0%B4-%D0%BF%D1%80%D0%B8%D1%81%D1%82%D0%B8%D0%B3%D0%B0%D0%BD%D0%B5%D1%82%D0%BE-%D0%BC%D1%83-%D0%B2-%D0%91%D1%8A%D0%BB%D0%B3%D0%B0%D1%80%D0%B8%D1%8F-%D0%BE%D0%BA%D0%BE%D0%BB%D0%BE-1879-1881-%D0%B3-340x500.jpg",
                imageAlt: "[Последната снимка на княза]",
                source: "„Напускам България, за да отстраня последната пречка.“",
                options: [
                    { text: "Абдикирам за мира.", impacts: { foreign: 20, internal: 10, unification: 10 }, feedback: "Това е вашата саможертва. България остава цяла." },
                    { text: "Оставам и се боря.", impacts: { foreign: -50, internal: 30, unification: -20 }, feedback: "Рискувате окупация, която би унищожила страната." }
                ]
            },
            {
                id: 11, year: "1886-1893 г.", title: "Изгнание",
                description: "Вече сте граф Хартенау. Живеете в Австрия, но винаги мислите за България.",
                imageUrl: "https://conservative.bg/wp-content/uploads/2019/04/batenberg1-679x1024.jpg",
                imageAlt: "[Граф Хартенау]",
                source: "„България винаги ще бъде в мислите ми.“",
                options: [
                    { text: "Живея скромно и достойно.", impacts: { foreign: 10, internal: 5, unification: 0 }, feedback: "Оставате неопетнен символ на българската кауза." },
                    { text: "Опитвам се да влияя на политиката.", impacts: { foreign: -10, internal: -10, unification: -5 }, feedback: "Това само затруднява дипломацията на наследника ви." }
                ]
            },
            {
                id: 12, year: "Вечен дом", title: "Заветът",
                description: "Вашето последно желание е да бъдете погребан в България. Къде ще бъде вечният ви дом?",
                imageUrl: "https://pylnoshtastie.com/wp-content/uploads/2017/11/IMG_6192.jpg",
                imageAlt: "[Мавзолеят]",
                source: "„Пренесете праха ми в България... тя ми е по-скъпа от всичко.“",
                options: [
                    { text: "В София, сред народа.", impacts: { foreign: 0, internal: 30, unification: 20 }, feedback: "Мавзолеят в София е вечен символ на връзката ви с България." },
                    { text: "В родния Дармщат.", impacts: { foreign: 5, internal: -10, unification: 0 }, feedback: "Щяхте да останете само име в европейската аристокрация." }
                ]
            }
        ];

        let state = {
            gameState: 'menu',
            playerName: '',
            currentStep: 0,
            scores: { foreign: 50, internal: 50, unification: 50 },
            lastFeedback: ''
        };

        const appElement = document.getElementById('app');

        function render() {
            let content = '';

            // Header (Always visible)
            const header = `
                <header class="bg-amber-900 text-amber-50 p-4 md:p-6 text-center border-b-4 border-amber-700 shadow-lg shrink-0 z-20">
                    <h1 class="text-lg md:text-2xl font-black tracking-[0.2em] uppercase serif italic">Княз Батенберг</h1>
                    <p class="text-amber-300 text-[10px] md:text-xs font-medium tracking-widest mt-1 opacity-80 uppercase">Решения и Съдби</p>
                </header>
            `;

            if (state.gameState === 'menu') {
                content = `
                    <div class="flex-grow flex flex-col items-center justify-center text-center max-w-md mx-auto py-10 zoom-in">
                        <div class="bg-white p-8 rounded-3xl shadow-xl border border-amber-200 w-full relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-full h-2 bg-amber-800"></div>
                            <div class="text-amber-800 mb-6 flex justify-center">
                                <i class="fas fa-history text-6xl opacity-80"></i>
                            </div>
                            <h2 class="text-xl md:text-2xl font-bold mb-4 text-slate-800">Добре дошли в историята!</h2>
                            <p class="text-slate-500 text-sm mb-8 italic">Ще поемете ли отговорността за съдбата на една новородена държава?</p>
                            
                            <div class="space-y-4">
                                <input type="text" id="playerNameInput" placeholder="Въведете името си..." 
                                    class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-amber-700 focus:outline-none transition-all text-center text-lg font-medium shadow-inner">
                                <button onclick="startGame()" class="w-full bg-amber-800 hover:bg-amber-900 text-white font-bold py-5 rounded-2xl shadow-lg transition-all active:scale-95 text-lg tracking-widest uppercase flex items-center justify-center gap-2">
                                    ПРИЕМИ МИСИЯТА <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.gameState === 'playing') {
                const currentCase = CASES[state.currentStep];
                content = `
                    <div class="flex-grow flex flex-col space-y-6 fade-in p-4 md:p-8 overflow-y-auto">
                        <!-- Stats Bar -->
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-amber-100 grid grid-cols-1 md:grid-cols-3 gap-4 shrink-0">
                            ${renderProgressBar("Външна Политика", state.scores.foreign, "bg-blue-600", "fa-globe")}
                            ${renderProgressBar("Вътрешна Политика", state.scores.internal, "bg-emerald-600", "fa-users")}
                            ${renderProgressBar("Обединение", state.scores.unification, "bg-rose-600", "fa-flag")}
                        </div>

                        <!-- Step Header -->
                        <div class="flex justify-between items-end border-b border-amber-200 pb-2">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-amber-900/40 uppercase tracking-tighter">Етап ${state.currentStep + 1} от ${CASES.length}</span>
                                <h3 class="text-lg md:text-2xl font-bold text-slate-800 leading-tight">${currentCase.title}</h3>
                            </div>
                            <div class="text-xl md:text-3xl font-black text-amber-900 serif italic border-l-4 border-amber-800 pl-4">
                                ${currentCase.year}
                            </div>
                        </div>

                        <!-- Main Layout -->
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
                            <div class="space-y-6">
                                <div class="relative group">
                                    <div class="rounded-3xl overflow-hidden shadow-2xl border-4 border-white h-64 md:h-96 bg-amber-100">
                                        <img src="${currentCase.imageUrl}" alt="${currentCase.imageAlt}" class="w-full h-full object-cover object-top transition-transform duration-700 group-hover:scale-105">
                                    </div>
                                    <div class="absolute -bottom-4 -right-4 bg-white p-4 rounded-2xl shadow-xl max-w-[80%] border border-amber-100 hidden md:block">
                                        <i class="fas fa-quote-left text-amber-800 mb-2 opacity-30 text-xl"></i>
                                        <p class="text-sm italic font-serif leading-relaxed text-slate-700">${currentCase.source}</p>
                                    </div>
                                </div>
                                <div class="md:hidden bg-white p-4 rounded-2xl shadow-sm border-l-4 border-amber-800 italic font-serif text-sm">
                                    ${currentCase.source}
                                </div>
                            </div>

                            <div class="flex flex-col justify-between space-y-8">
                                <div class="bg-amber-100/50 p-6 md:p-8 rounded-3xl shadow-inner border border-amber-200/50">
                                    <p class="text-base md:text-xl text-slate-700 leading-relaxed font-medium">${currentCase.description}</p>
                                </div>

                                <div class="space-y-3">
                                    <span class="text-[10px] font-black text-amber-900 uppercase tracking-[0.2em] ml-2 opacity-60">Изберете действие:</span>
                                    ${currentCase.options.map((opt, idx) => `
                                        <button onclick="handleOption(${idx})" class="w-full text-left bg-white hover:bg-slate-900 hover:text-white border-2 border-slate-100 hover:border-slate-900 p-5 rounded-2xl transition-all duration-300 font-bold text-base md:text-lg shadow-sm hover:shadow-xl active:scale-[0.98] flex items-center gap-4 group text-slate-800">
                                            <span class="w-10 h-10 rounded-xl bg-amber-50 group-hover:bg-amber-900 text-amber-900 group-hover:text-white flex items-center justify-center shrink-0 border border-amber-200 font-black transition-colors">
                                                ${idx + 1}
                                            </span>
                                            <span>${opt.text}</span>
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.gameState === 'feedback') {
                content = `
                    <div class="flex-grow flex flex-col items-center justify-center zoom-in max-w-2xl mx-auto w-full p-4">
                        <div class="bg-amber-900 text-white p-8 md:p-14 rounded-[3rem] shadow-2xl relative overflow-hidden text-center w-full">
                            <div class="absolute top-0 right-0 p-8 opacity-10">
                                <i class="fas fa-scroll text-[120px]"></i>
                            </div>
                            <h3 class="text-xs font-black uppercase mb-6 text-amber-400 tracking-[0.4em]">Последици от решението</h3>
                            <p class="text-xl md:text-3xl mb-12 leading-relaxed font-serif italic text-amber-50">„${state.lastFeedback}“</p>
                            <button onclick="nextStep()" class="w-full bg-amber-100 hover:bg-white text-amber-900 font-black py-6 rounded-2xl transition-all active:scale-95 shadow-xl text-xl uppercase tracking-widest flex items-center justify-center gap-3">
                                Към следващото изпитание <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>
                `;
            } else if (state.gameState === 'final') {
                content = `
                    <div class="flex-grow flex flex-col items-center justify-center space-y-10 fade-in py-10 max-w-4xl mx-auto w-full p-4">
                        <div class="relative">
                            <h2 class="text-3xl md:text-6xl font-black text-slate-800 uppercase tracking-tighter leading-none">Мисията приключи</h2>
                            <div class="h-2 w-full bg-amber-800 mt-2"></div>
                        </div>

                        <div class="w-full bg-white p-8 md:p-16 rounded-[3rem] border-8 border-double border-amber-800 shadow-2xl relative overflow-hidden">
                            <div class="absolute top-4 left-4 right-4 bottom-4 border border-amber-100 rounded-[2rem] pointer-events-none opacity-50"></div>
                            <div class="relative z-10 space-y-8">
                                <div class="text-center">
                                    <span class="text-[10px] md:text-xs font-black text-amber-800 uppercase tracking-[0.5em] block mb-4">Почетно Свидетелство</span>
                                    <h3 class="text-2xl md:text-4xl font-black text-slate-900 mb-2">За вярност към България</h3>
                                    <p class="text-2xl md:text-5xl font-serif italic text-amber-900 underline decoration-amber-300 decoration-8 underline-offset-8">${state.playerName}</p>
                                </div>

                                <div class="bg-slate-50 p-6 md:p-10 rounded-3xl border border-slate-100 space-y-6">
                                    <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest text-center">Оценка на управлението</h4>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        ${renderProgressBar("Външна Политика", state.scores.foreign, "bg-blue-600", "fa-globe")}
                                        ${renderProgressBar("Вътрешна Политика", state.scores.internal, "bg-emerald-600", "fa-users")}
                                        ${renderProgressBar("Обединение", state.scores.unification, "bg-rose-600", "fa-flag")}
                                    </div>
                                </div>

                                <div class="flex flex-col md:flex-row gap-4">
                                    <button onclick="downloadResults()" class="flex-1 flex items-center justify-center gap-3 bg-slate-900 hover:bg-black text-white px-8 py-5 rounded-2xl font-bold transition-all active:scale-95 shadow-xl text-lg uppercase tracking-widest">
                                        <i class="fas fa-download"></i> Изтегли Грамота
                                    </button>
                                    <button onclick="location.reload()" class="flex-1 flex items-center justify-center gap-3 bg-amber-800 hover:bg-amber-900 text-white px-8 py-5 rounded-2xl font-bold transition-all active:scale-95 shadow-xl text-lg uppercase tracking-widest">
                                        <i class="fas fa-undo"></i> Опитай отново
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-2 text-slate-400 font-serif italic">
                            <i class="fas fa-award text-amber-600"></i>
                            <span>„Боже, пази България!“</span>
                        </div>
                    </div>
                `;
            }

            const footer = (state.gameState === 'menu' || state.gameState === 'final') ? `
                <footer class="p-4 text-center text-[10px] text-amber-900/40 uppercase tracking-widest font-bold">
                    Образователен проект по история • 2026
                </footer>
            ` : '';

            appElement.innerHTML = header + content + footer;
        }

        function renderProgressBar(label, value, color, icon) {
            return `
                <div class="w-full">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] md:text-xs font-bold text-slate-600 uppercase flex items-center gap-1">
                            <i class="fas ${icon} text-[12px]"></i> ${label}
                        </span>
                        <span class="text-xs font-black text-slate-800">${value}%</span>
                    </div>
                    <div class="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
                        <div class="h-full progress-transition ${color}" style="width: ${value}%"></div>
                    </div>
                </div>
            `;
        }

        function startGame() {
            const nameInput = document.getElementById('playerNameInput');
            if (nameInput && nameInput.value.trim().length >= 2) {
                state.playerName = nameInput.value.trim();
                state.gameState = 'playing';
                render();
            }
        }

        function handleOption(optionIndex) {
            const option = CASES[state.currentStep].options[optionIndex];
            state.scores.foreign = Math.max(0, Math.min(100, state.scores.foreign + option.impacts.foreign));
            state.scores.internal = Math.max(0, Math.min(100, state.scores.internal + option.impacts.internal));
            state.scores.unification = Math.max(0, Math.min(100, state.scores.unification + option.impacts.unification));
            state.lastFeedback = option.feedback;
            state.gameState = 'feedback';
            render();
        }

        function nextStep() {
            if (state.currentStep < CASES.length - 1) {
                state.currentStep++;
                state.gameState = 'playing';
            } else {
                state.gameState = 'final';
            }
            render();
        }

        function downloadResults() {
            const content = `ИСТОРИЧЕСКА МИСИЯ: КНЯЗ БАТЕНБЕРГ\n` +
                            `Ученик: ${state.playerName}\n` +
                            `Дата: ${new Date().toLocaleDateString('bg-BG')}\n\n` +
                            `ПОСТИЖЕНИЯ:\n` +
                            `- Външна политика: ${state.scores.foreign}%\n` +
                            `- Вътрешна политика: ${state.scores.internal}%\n` +
                            `- Обединение: ${state.scores.unification}%\n\n` +
                            `„Боже, пази България!“`;
            
            const element = document.createElement("a");
            const file = new Blob([content], {type: 'text/plain'});
            element.href = URL.createObjectURL(file);
            element.download = `Rezultat_${state.playerName}.txt`;
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        // Първоначално рендиране
        render();
    </script>
</body>
</html>
